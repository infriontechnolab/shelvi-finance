name: Deploy to production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate PHP dependencies resolve
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' --exclude='.env.backup' --exclude='.env.production' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='auth.json' \
            --exclude='.htaccess' \
            --exclude='storage/logs/*' \
            --exclude='storage/pail/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/testing/*' \
            --exclude='storage/framework/views/*' \
            --exclude='public/storage' \
            --exclude='public/hot' \
            --exclude='bootstrap/cache/*.php' \
            --exclude='.phpunit.result.cache' \
            --exclude='.phpunit.cache' \
            --exclude='.idea' --exclude='.vscode' --exclude='.DS_Store' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Install server-side dependencies and migrate
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            PHP=/opt/alt/php83/usr/bin/php
            $PHP /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            chmod -R 775 storage bootstrap/cache
            $PHP artisan migrate --force
            $PHP artisan config:clear
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache
          '

      - name: Verify deploy
        run: |
          curl -sf -o /dev/null https://finance.shelvifinancial.in/login
